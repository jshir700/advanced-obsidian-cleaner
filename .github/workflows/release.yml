name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'advanced-obsidian-cleaner/src/**'
      - 'advanced-obsidian-cleaner/styles.css'
      - 'advanced-obsidian-cleaner/manifest.json'
      - 'advanced-obsidian-cleaner/package.json'
      - 'advanced-obsidian-cleaner/package-lock.json'
      - 'advanced-obsidian-cleaner/esbuild.config.mjs'
      - '.github/workflows/**'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: ./advanced-obsidian-cleaner

      - name: Build
        run: npm run build
        working-directory: ./advanced-obsidian-cleaner

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./advanced-obsidian-cleaner/manifest.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create ZIP
        run: |
          cd advanced-obsidian-cleaner
          zip -j ../advanced-obsidian-cleaner-v${{ steps.version.outputs.version }}.zip \
            main.js styles.css manifest.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: advanced-obsidian-cleaner
          path: advanced-obsidian-cleaner-v*.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: advanced-obsidian-cleaner-v*.zip
          draft: false
          prerelease: false
          body: |
            ## English

            - Auto-built from ${{ github.sha }}
            - Extract `main.js`, `styles.css`, `manifest.json` to your Obsidian plugins folder

            ## 中文

            - 自动构建，提交哈希 ${{ github.sha }}
            - 将 `main.js`、`styles.css`、`manifest.json` 解压到 Obsidian 插件目录
